<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NYC 여행 전체 일정 지도 (10/6~10/20)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --bg:#0e1116; --panel:rgba(18,22,30,.82); --panel-solid:#151a23;
    --line:rgba(255,255,255,.07); --txt:#f2f5f9; --sub:#98a2b3;
    --acc:#4f8cff; --acc-grad:linear-gradient(135deg,#5b95ff,#3f7bf0);
    --shadow:0 8px 28px rgba(0,0,0,.42);
    --blur:blur(18px) saturate(1.5);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); overscroll-behavior:none;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  button { font-family:inherit; }

  /* ---- 레이아웃: header 56 + day칩 42 + legend 30 = 128 ---- */
  header {
    position:fixed; top:0; left:0; right:0; height:56px; z-index:1000;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--txt); display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; padding-top:env(safe-area-inset-top);
  }
  header h1 { font-size:16px; margin:0; font-weight:700; letter-spacing:-.01em; }
  header .sub { font-size:11px; color:var(--sub); margin-top:2px; }
  #hd-expense {
    border:none; background:rgba(255,255,255,.08); color:var(--txt);
    font-size:11.5px; font-weight:600; padding:7px 12px; border-radius:999px; cursor:pointer;
    transition:background .2s;
  }
  #hd-expense:active { background:rgba(255,255,255,.16); }

  #daybar {
    position:fixed; top:56px; left:0; right:0; height:46px; z-index:1000;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    display:flex; gap:6px; align-items:center;
    padding:0 10px; overflow-x:auto; white-space:nowrap;
    border-top:1px solid var(--line); -webkit-overflow-scrolling:touch;
  }
  #daybar::-webkit-scrollbar { display:none; }
  .day-chip {
    flex:0 0 auto; padding:5px 12px; border-radius:12px; cursor:pointer;
    background:rgba(255,255,255,.05); color:var(--sub); font-size:11.5px; font-weight:700;
    border:1px solid transparent; line-height:1.25; text-align:center;
    transition: background .2s, color .2s, transform .15s, box-shadow .2s;
  }
  .day-chip:active { transform:scale(.95); }
  .day-chip .dc-date { display:block; font-size:9.5px; font-weight:500; opacity:.7; }
  .day-chip.active {
    background:var(--acc-grad); color:#fff;
    box-shadow:0 3px 12px rgba(79,140,255,.4);
  }
  .day-chip.empty { opacity:.45; }
  .day-chip.active.empty { opacity:1; background:#39435466; box-shadow:none; border-color:var(--line); }

  #legend {
    position:fixed; top:102px; left:0; right:0; height:32px; z-index:1000;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--txt); padding:0 12px; font-size:10.5px;
    display:flex; gap:8px; align-items:center; overflow-x:auto; white-space:nowrap;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
  }
  #legend::-webkit-scrollbar { display:none; }
  .legend-item {
    display:flex; align-items:center; gap:6px; flex:0 0 auto; color:var(--sub); font-weight:600;
    background:rgba(255,255,255,.05); border-radius:999px; padding:3px 10px;
  }
  .legend-line { width:16px; height:4px; border-radius:2px; display:inline-block; }

  #map { position:absolute; top:134px; bottom:0; left:0; right:0; }

  /* ---- 팝업 ---- */
  .leaflet-popup-content-wrapper {
    border-radius:16px; box-shadow:0 14px 44px rgba(0,0,0,.32);
  }
  .leaflet-popup-content { margin:13px 15px; }
  .popup-title { font-weight:800; font-size:14px; margin-bottom:3px; letter-spacing:-.01em; }
  .popup-time { color:var(--acc); font-weight:700; font-size:12px; margin-bottom:7px; }
  .popup-row { font-size:12px; margin:3px 0; line-height:1.45; }
  .popup-row b { color:#333; }
  .popup-note { font-size:11.5px; color:#8a5200; background:#fff4e0; border-radius:10px; padding:7px 9px; margin-top:7px; line-height:1.45; }

  .divnum {
    background:linear-gradient(180deg,#6aa2ff,#3f7bf0); color:#fff; border-radius:50%; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
    border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.4);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .divnum.food { background:linear-gradient(180deg,#f07264,#d84838); }
  .divnum.attraction { background:linear-gradient(180deg,#a279ff,#7847ec); }
  .divnum.transit { background:linear-gradient(180deg,#6f7a8a,#4d5765); }
  .divnum.sel {
    transform:scale(1.35);
    box-shadow:0 0 0 4px rgba(79,140,255,.35), 0 4px 14px rgba(0,0,0,.5);
  }

  /* ---- 스크롤 피커 ---- */
  #picker-label {
    position:fixed; z-index:1000; right:14px; bottom:calc(242px + env(safe-area-inset-bottom));
    max-width:180px; background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px;
    padding:7px 11px; border-radius:12px; text-align:right; line-height:1.35;
    box-shadow:var(--shadow); border:1px solid var(--line);
  }
  #picker-label .pl-num { color:var(--acc); font-weight:800; margin-right:4px; }
  #picker-wrap {
    position:fixed; right:14px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:1000;
    width:172px; height:220px; border-radius:20px; overflow:hidden;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    box-shadow:var(--shadow); border:1px solid var(--line);
  }
  #picker-highlight {
    position:absolute; left:6px; right:6px; top:88px; height:44px; z-index:2;
    background:rgba(79,140,255,.14); border-top:1px solid rgba(79,140,255,.55);
    border-bottom:1px solid rgba(79,140,255,.55); border-radius:8px; pointer-events:none;
  }
  #picker-scroll {
    position:absolute; inset:0; overflow-y:scroll; -webkit-overflow-scrolling:touch;
    scroll-snap-type:y mandatory; padding:88px 0;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 30%, #000 70%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0, #000 30%, #000 70%, transparent 100%);
  }
  #picker-scroll::-webkit-scrollbar { display:none; }
  .picker-row {
    height:44px; display:flex; align-items:center; justify-content:center; gap:6px;
    scroll-snap-align:center; color:#6b7484; font-size:13px; font-weight:500; cursor:pointer;
    transition: color .15s ease, font-size .15s ease, font-weight .15s ease;
  }
  .picker-row .pr-num {
    width:20px; height:20px; border-radius:50%; background:#1d232e; color:#9aa3b2;
    display:flex; align-items:center; justify-content:center; font-size:10px; flex:0 0 auto;
    transition: background .15s ease, color .15s ease;
  }
  .picker-row.active { color:#fff; font-size:14.5px; font-weight:700; }
  .picker-row.active .pr-num { background:#4f8cff; color:#fff; }

  /* ---- 미정 날짜 안내 카드 ---- */
  @keyframes phIn { from { opacity:0; transform:translate(-50%,-36%); } to { opacity:1; transform:translate(-50%,-40%); } }
  #placeholder {
    position:fixed; z-index:999; left:50%; top:50%; transform:translate(-50%,-40%);
    width:min(86vw, 400px); background:var(--panel); color:#e8ecf2;
    -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border-radius:20px; padding:20px 18px; box-shadow:var(--shadow); border:1px solid var(--line);
    display:none; line-height:1.6; font-size:13px;
    animation:phIn .28s cubic-bezier(.32,.72,.25,1);
  }
  #placeholder h2 { margin:0 0 8px; font-size:15px; color:var(--acc); }
  #placeholder .ph-note { color:#9aa3b2; font-size:12px; margin-top:10px; }

  /* ---- 일별 지출 요약 (우측상단) ---- */
  #day-summary {
    position:fixed; top:142px; right:10px; z-index:999; display:none; cursor:pointer;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px; font-weight:700;
    padding:7px 11px; border-radius:999px; box-shadow:var(--shadow); border:1px solid var(--line);
    transition:transform .15s;
  }
  #day-summary:active { transform:scale(.96); }
  #day-summary .ds-lbl { color:var(--sub); font-size:10px; font-weight:500; margin:0 2px 0 7px; }
  #day-summary .ds-lbl:first-child { margin-left:0; }
  #day-summary .ds-chev { color:var(--sub); margin-left:5px; font-weight:400; }

  /* ---- 팝업 버튼/태그 ---- */
  .pbtn-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
  .pbtn {
    flex:1 1 auto; text-align:center; font-size:11.5px; font-weight:700; padding:7px 9px;
    border-radius:999px; background:#eef2f8; color:#2c3a4f; text-decoration:none; border:none; cursor:pointer;
    font-family:inherit; transition:filter .15s, transform .1s;
  }
  .pbtn:active { filter:brightness(.92); transform:scale(.97); }
  .pbtn.spend { background:var(--acc-grad); color:#fff; flex-basis:100%; }
  .cat-tag { font-size:10px; background:#eef2f8; color:#5b6572; border-radius:999px; padding:1px 7px; margin-left:5px; }
  .popup-row.spent { color:#1d7a3c; font-weight:700; }

  /* ---- GPS 버튼 ---- */
  #gps-btn {
    position:fixed; left:14px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:1000;
    width:46px; height:46px; border-radius:50%; border:1px solid var(--line); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; box-shadow:var(--shadow); transition:background .2s, transform .15s;
  }
  #gps-btn:active { transform:scale(.94); }
  #gps-btn svg { width:20px; height:20px; stroke:#e6ebf2; }
  #gps-btn.on { background:var(--acc-grad); border-color:transparent; }
  #gps-btn.on svg { stroke:#fff; }
  .gps-dot { width:14px; height:14px; border-radius:50%; background:#4f8cff; border:3px solid #fff; box-shadow:0 0 10px rgba(79,140,255,.9); }

  /* ---- 지출 입력 시트 ---- */
  #spend-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:2000;
    background:var(--panel-solid); color:#fff; border-radius:20px 20px 0 0;
    padding:14px 16px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.55); border-top:1px solid var(--line);
    transform:translateY(110%); transition:transform .3s cubic-bezier(.32,.72,.25,1);
  }
  #spend-sheet.open { transform:translateY(0); }
  #spend-sheet::before {
    content:''; display:block; width:36px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.18); margin:0 auto 12px;
  }
  #spend-sheet h3 { margin:0 0 12px; font-size:14px; letter-spacing:-.01em; }
  .ss-row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  #ss-amt, #ss-memo {
    flex:1; min-width:0; background:#1d232e; border:1px solid #2c3442; color:#fff;
    border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit;
  }
  .pay-btn { padding:10px 14px; border-radius:10px; background:#1d232e; color:#9aa3b2; border:1px solid #2c3442; font-size:13px; cursor:pointer; font-family:inherit; }
  .pay-btn.sel { background:#4f8cff; color:#fff; border-color:#4f8cff; }
  .ss-actions { display:flex; gap:8px; }
  .ss-actions button { flex:1; padding:11px; border-radius:10px; border:none; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  #ss-save { background:#4f8cff; color:#fff; }
  #ss-del { background:#3a2026; color:#e0574c; }
  #ss-close { background:#1d232e; color:#9aa3b2; }

  /* ---- 전체 지출 모달 ---- */
  #expense-modal {
    position:fixed; inset:0; z-index:2100; background:rgba(0,0,0,.55);
    display:none; align-items:center; justify-content:center;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(18px) scale(.97); } to { opacity:1; transform:none; } }
  #expense-card {
    width:min(92vw,430px); max-height:80vh; overflow-y:auto;
    background:var(--panel-solid); color:#fff; border-radius:20px; padding:18px;
    border:1px solid var(--line); box-shadow:var(--shadow);
    animation:cardIn .28s cubic-bezier(.32,.72,.25,1);
  }
  #expense-card h2 { font-size:15px; margin:0 0 12px; color:#4f8cff; }
  #expense-card h4 { font-size:12.5px; margin:16px 0 6px; color:#9aa3b2; }
  #expense-card table { width:100%; border-collapse:collapse; font-size:12px; }
  #expense-card th, #expense-card td { padding:6px 4px; text-align:right; border-bottom:1px solid #262b36; }
  #expense-card th:first-child, #expense-card td:first-child { text-align:left; }
  #expense-card th { color:#9aa3b2; font-weight:600; }
  .em-total td { font-weight:800; color:#fff; border-top:2px solid #3a4657; }
  #em-close { margin-top:14px; width:100%; padding:11px; border-radius:10px; border:none; background:#1d232e; color:#9aa3b2; font-weight:700; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<header>
  <div>
    <h1 id="hd-title">NYC 여행 전체 일정</h1>
    <div class="sub" id="hd-sub">10/6(화) ~ 10/20(화) · 14박 15일</div>
  </div>
  <button id="hd-expense">지출 현황</button>
</header>

<div id="daybar"></div>
<div id="legend"></div>
<div id="map"></div>
<div id="placeholder"></div>

<div id="day-summary"></div>
<button id="gps-btn" title="내 위치 표시" aria-label="내 위치 표시">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="3.2"/>
    <path d="M12 2.5v3.2M12 18.3v3.2M21.5 12h-3.2M5.7 12H2.5"/>
    <circle cx="12" cy="12" r="7.3"/>
  </svg>
</button>

<div id="spend-sheet">
  <h3 id="ss-title"></h3>
  <div class="ss-row">
    <input id="ss-amt" type="number" inputmode="decimal" step="0.01" placeholder="금액 ($, 2인 합계)">
    <button class="pay-btn" id="pay-card">카드</button>
    <button class="pay-btn" id="pay-cash">현금</button>
  </div>
  <div class="ss-row"><input id="ss-memo" type="text" placeholder="먹은 메뉴 / 메모 (선택)"></div>
  <div class="ss-actions">
    <button id="ss-save">저장</button>
    <button id="ss-del">삭제</button>
    <button id="ss-close">닫기</button>
  </div>
</div>

<div id="expense-modal"><div id="expense-card">
  <h2>여행 지출 현황 (2인 합계, USD)</h2>
  <div id="em-body"></div>
  <button id="em-close">닫기</button>
</div></div>

<div id="picker-label">스크롤해서 스팟 선택 ▾</div>
<div id="picker-wrap">
  <div id="picker-highlight"></div>
  <div id="picker-scroll"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';
/* ============================================================
   데이터 구조 (확장 방법)
   - DAYS 배열에 날짜별 객체를 추가/수정하면 UI 전체가 자동 반영됨
   - stops: {type:'food'|'attraction'|'transit', name, coord:[lat,lng], time, stay, menu, price, note}
   - modes: stops[i] -> stops[i+1] 구간의 이동수단 ('uber'|'walk'|'subway'|'bus')
     → 길이는 반드시 stops.length - 1
   - stops가 비어 있으면 "미정" 카드가 표시됨 (placeholder 텍스트 사용)
   ============================================================ */

const MODE_META = {
  uber:   { color:'#e07a1f', dash:'8,8', weight:4, label:'Uber/Lyft' },
  walk:   { color:'#2fa84f', dash:null,  weight:4, label:'도보' },
  subway: { color:'#3f6fe0', dash:null,  weight:6, label:'지하철' },
  bus:    { color:'#d0312d', dash:null,  weight:5, label:'TopView 버스' },
};

const DAYS = [
{ day:1, date:'10/6', dow:'화', title:'Day 1 · 도착', sub:'EWR 도착 → 호텔 이동만',
  stops:[
    { type:'transit', name:'뉴어크 공항 (EWR)', coord:[40.6895,-74.1745],
      time:'22:30 도착 (현지시간)', stay:'-', menu:'-', price:'-',
      note:'에어프레미아 YP131. 입국심사+수하물 약 1~1.5시간 예상 — 당일 일정 없음' },
    { type:'transit', name:'호텔 (Aura, Brooklyn)', coord:[40.6939,-73.9605],
      time:'자정 전후 체크인', stay:'-', menu:'-', price:'Uber/Lyft 약 $70~95 + 톨',
      note:'약 19마일·40~50분. 심야라 대중교통 비추천 — 라이드셰어로 바로 이동. 두 앱 실시간가 비교' },
  ],
  modes:['uber'] },

{ day:2, date:'10/7', dow:'수', title:'Day 2 · 브릿지+미드타운', sub:'브루클린 브릿지 → 미드타운 → 록펠러 → 퀸즈',
  stops:[
    { type:'transit', name:'호텔 (Aura, Brooklyn)', coord:[40.6939,-73.9605],
      time:'08:30 출발', stay:'-', menu:'-', price:'-',
      note:'오늘 첫 Uber/Lyft 구간. Lyft $17 견적 / Uber 추정 $16~19 — 짧은 구간이라 차이 미미, 승차 직전 실시간가 비교' },
    { type:'transit', name:'High St 역 (A·C)', coord:[40.7023,-73.9909],
      time:'08:45 도착', stay:'-', menu:'-', price:'약 $17',
      note:'2.5마일·12분 구간. 여기서부터 도보로 브루클린 브릿지 진입로까지 이동' },
    { type:'transit', name:'브루클린 브릿지 진입', coord:[40.7038,-73.9958],
      time:'08:45~08:53', stay:'-', menu:'-', price:'무료',
      note:'Cadman Plaza 경유 도보 8분' },
    { type:'attraction', name:'브루클린 브릿지 도보 횡단', coord:[40.7075,-74.0015],
      time:'08:53~09:25', stay:'약 30분', menu:'-', price:'무료',
      note:'1.1마일, 사진 포함 25~35분. 평일 오전이라 주말보다 한산' },
    { type:'transit', name:'Brooklyn Bridge-City Hall 역', coord:[40.7135,-74.0044],
      time:'09:25 도착', stay:'-', menu:'-', price:'-',
      note:'도보 3분 후 6호선(로컬) 탑승, 환승 없이 51 St까지' },
    { type:'transit', name:'51 St 역 (6호선)', coord:[40.7571,-73.9719],
      time:'09:50 도착', stay:'-', menu:'-', price:'$2.90/인',
      note:'6호선은 51 St 정차, 4/5는 급행이라 통과함 — 반드시 6호선' },
    { type:'food', name:'Ess-a-Bagel', coord:[40.7580,-73.9682],
      time:'09:53~10:13', stay:'20분', menu:'에브리씽 베이글+록스&스캘리언 크림치즈', price:'$15.95 (1개 기준)',
      note:'카운터서비스 — 주문만 하고 나가는 구조, 팁 불필요. 06:00 오픈' },

/* ============================================================
   이하 렌더링 로직 — 데이터만 고치면 아래는 손댈 필요 없음
   ============================================================ */
const ROW_H = 44;
const map = L.map('map', { zoomControl:false }).setView([40.7128,-74.0060], 12);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains:'abcd',
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

const dayLayer = L.layerGroup().addTo(map);
const daybarEl = document.getElementById('daybar');
const legendEl = document.getElementById('legend');
const phEl = document.getElementById('placeholder');
const scrollEl = document.getElementById('picker-scroll');
const labelEl = document.getElementById('picker-label');
const pickerWrap = document.getElementById('picker-wrap');
const hdTitle = document.getElementById('hd-title');
const hdSub = document.getElementById('hd-sub');

let markers = [], rows = [];
let currentIndex = 0, settleTimer = null, programmaticScroll = false;
let curDay = null;

/* --- day 칩 생성 --- */
const chips = [];
DAYS.forEach((d, i) => {
  const c = document.createElement('div');
  c.className = 'day-chip' + (d.stops.length ? '' : ' empty');
  c.innerHTML = `D${d.day}<span class="dc-date">${d.date} ${d.dow}</span>`;
  c.addEventListener('click', () => selectDay(i));
  daybarEl.appendChild(c);
  chips.push(c);
});

function buildLegend(day){
  const used = [...new Set(day.modes)];
  legendEl.innerHTML = used.length
    ? used.map(m => `<div class="legend-item"><span class="legend-line" style="background:${MODE_META[m].color}"></span>${MODE_META[m].label}</div>`).join('')
    : '<div class="legend-item" style="color:#6b7484">일정 확정 후 이동수단이 표시됩니다</div>';
}

function selectDay(i){
  curDay = i;
  const day = DAYS[i];
  chips.forEach((c,k)=> c.classList.toggle('active', k===i));
  chips[i].scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  hdTitle.textContent = day.title;
  hdSub.textContent = `${day.date}(${day.dow}) · ${day.sub}`;
  try { localStorage.setItem('nycLastDay', String(i)); } catch(e){}

  dayLayer.clearLayers();
  markers = []; rows = []; currentIndex = 0;
  scrollEl.innerHTML = '';
  buildLegend(day);
  updateDaySummary(i);

  if (!day.stops.length){
    phEl.style.display = 'block';
    phEl.innerHTML = `<h2>${day.title} — ${day.date}(${day.dow})</h2>${day.placeholder || '상세 일정 미정'}<div class="ph-note">확정되면 이 파일의 DAYS 데이터에 stops를 채우면 지도·피커가 자동 생성됩니다.</div>`;
    pickerWrap.style.display = 'none';
    labelEl.style.display = 'none';
    map.setView([40.7300,-73.9850], 11);
    return;
  }

  phEl.style.display = 'none';
  pickerWrap.style.display = 'block';
  labelEl.style.display = 'block';
  labelEl.innerHTML = '스크롤해서 스팟 선택 ▾';

  day.stops.forEach((s, idx) => {
    const icon = L.divIcon({
      className:'', html:`<div class="divnum ${s.type}">${idx}</div>`,
      iconSize:[26,26], iconAnchor:[13,13]
    });
    const m = L.marker(s.coord, { icon }).addTo(dayLayer);
    m.bindPopup(() => buildPopup(i, idx), { maxWidth:270 });
    m.on('click', () => focusStop(idx, 'marker'));
    markers.push(m);
  });

  for (let k=0; k<day.stops.length-1; k++){
    const meta = MODE_META[day.modes[k]] || MODE_META.walk;
    const seg = [day.stops[k].coord, day.stops[k+1].coord];
    L.polyline(seg, { color:'#ffffff', weight: meta.weight+4, opacity:0.9 }).addTo(dayLayer);
    L.polyline(seg, { color: meta.color, weight: meta.weight, opacity:1, dashArray: meta.dash }).addTo(dayLayer);
  }

  map.fitBounds(L.latLngBounds(day.stops.map(s=>s.coord)), { padding:[30,30] });

  day.stops.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'picker-row';
    let nm = s.name;
    if (nm.length > 11) nm = nm.slice(0,10) + '…';
    row.innerHTML = `<span class="pr-num">${idx}</span><span>${nm}</span>`;
    row.addEventListener('click', () => focusStop(idx));
    scrollEl.appendChild(row);
    rows.push(row);
  });
  programmaticScroll = true;
  scrollEl.scrollTop = 0;
  setTimeout(()=> programmaticScroll = false, 200);
  updateActiveRow(0);
}

function updateActiveRow(i){ rows.forEach((r,k)=> r.classList.toggle('active', k===i)); }
function updatePickerLabel(i){
  labelEl.innerHTML = `<span class="pl-num">${i}</span>${DAYS[curDay].stops[i].name}`;
}
function scrollToIndex(i){
  programmaticScroll = true;
  scrollEl.scrollTo({ top: i*ROW_H, behavior:'smooth' });
  setTimeout(()=> programmaticScroll = false, 450);
}
function setSelMarker(i){
  markers.forEach((m, k) => {
    const el = m.getElement();
    if (el){ const d = el.querySelector('.divnum'); if (d) d.classList.toggle('sel', k===i); }
    m.setZIndexOffset(k===i ? 1000 : 0);
  });
}
function focusStop(i, source){
  currentIndex = i;
  updateActiveRow(i);
  updatePickerLabel(i);
  setSelMarker(i);
  if (source !== 'picker') scrollToIndex(i);
  if (source !== 'marker') map.flyTo(DAYS[curDay].stops[i].coord, 16, { duration:0.5 });
  markers[i].openPopup();
}

scrollEl.addEventListener('scroll', () => {
  if (!DAYS[curDay] || !DAYS[curDay].stops.length) return;
  const N = DAYS[curDay].stops.length;
  const idx = Math.max(0, Math.min(N-1, Math.round(scrollEl.scrollTop / ROW_H)));
  updateActiveRow(idx);
  clearTimeout(settleTimer);
  settleTimer = setTimeout(() => {
    if (programmaticScroll) return;
    if (idx !== currentIndex || labelEl.textContent.includes('선택')) {
      currentIndex = idx;
      updatePickerLabel(idx);
      setSelMarker(idx);
      map.flyTo(DAYS[curDay].stops[idx].coord, 16, { duration:0.5 });
      markers[idx].openPopup();
    }
  }, 130);
}, { passive:true });

function persistSpend(){ try { localStorage.setItem('nycSpendV1', JSON.stringify(SPEND)); } catch(e){} }
let SPEND = loadSpend();
const spendKey = (dayNo, si) => 'd' + dayNo + 's' + si;
const fmt$ = v => '$' + (Math.round(v*100)/100);

/* --- 팝업 생성 (예상/실제 지출 + 딥링크 버튼 포함) --- */
function buildPopup(di, si){
  const d = DAYS[di], s = d.stops[si];
  const est = (EST[d.day] || {})[si];
  const sp = SPEND[spendKey(d.day, si)];
  const lat = s.coord[0], lng = s.coord[1];
  const gmap = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  const uber = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${lat}&dropoff[longitude]=${lng}&dropoff[nickname]=${encodeURIComponent(s.name)}`;
  const lyft = `https://ride.lyft.com/ridetype?id=lyft&destination[latitude]=${lat}&destination[longitude]=${lng}`;
  const extra = (s.links || []).map(l => `<a class="pbtn" href="${l.url}" target="_blank">${l.label}</a>`).join('');
  return `
    <div class="popup-title">${si}. ${s.name}</div>
    <div class="popup-time">${s.time}${s.stay && s.stay!=='-' ? ' · 체류 '+s.stay : ''}</div>
    ${s.menu && s.menu!=='-' ? `<div class="popup-row"><b>메뉴</b> ${s.menu}</div>` : ''}
    ${s.price && s.price!=='-' ? `<div class="popup-row"><b>가격</b> ${s.price}</div>` : ''}
    ${est ? `<div class="popup-row"><b>예상</b> ${fmt$(est[0])}${est[1]>est[0] ? '~'+fmt$(est[1]) : ''}<span class="cat-tag">${est[2]}</span></div>` : ''}
    ${sp ? `<div class="popup-row spent"><b>실제</b> ${fmt$(sp.amt)} · ${sp.pay==='cash'?'현금':'카드'}${sp.memo ? ' · '+sp.memo : ''}</div>` : ''}
    <div class="popup-note">${s.note}</div>
    <div class="pbtn-row">
      <a class="pbtn" href="${gmap}" target="_blank">길찾기</a>
      <a class="pbtn" href="${uber}" target="_blank">Uber</a>
      <a class="pbtn" href="${lyft}" target="_blank">Lyft</a>
      ${extra}
      <button class="pbtn spend" onclick="openSpend(${di},${si})">지출 ${sp ? '수정' : '입력'}</button>
    </div>`;
}

/* --- 일별 요약 (우측상단) --- */
function estSumDay(d){
  const t = EST[d.day]; if (!t) return null;
  let mn=0, mx=0;
  for (const k in t){ mn += t[k][0]; mx += t[k][1]; }
  return [mn, mx];
}
function actSumDay(d){
  let a = 0;
  d.stops.forEach((s, k) => { const sp = SPEND[spendKey(d.day, k)]; if (sp) a += sp.amt; });
  return a;
}
function updateDaySummary(i){
  const d = DAYS[i], el = document.getElementById('day-summary');
  if (!d.stops.length){ el.style.display = 'none'; return; }
  const est = estSumDay(d), act = actSumDay(d);
  el.style.display = 'block';
  el.innerHTML =
    `<span class="ds-lbl">예상</span>${est ? fmt$(Math.round(est[0]))+(est[1]>est[0] ? '~'+fmt$(Math.round(est[1])) : '') : '—'}` +
    `<span class="ds-lbl">실제</span>${fmt$(act)}<span class="ds-chev">›</span>`;
}

/* --- 지출 입력 시트 --- */
let sheetTarget = null, curPay = 'card';
const sheetEl = document.getElementById('spend-sheet');
function setPay(p){
  curPay = p;
  document.getElementById('pay-card').classList.toggle('sel', p==='card');
  document.getElementById('pay-cash').classList.toggle('sel', p==='cash');
}
function openSpend(di, si){
  sheetTarget = [di, si];
  const d = DAYS[di], sp = SPEND[spendKey(d.day, si)] || {};
  document.getElementById('ss-title').textContent = si + '. ' + d.stops[si].name;
  document.getElementById('ss-amt').value = sp.amt != null ? sp.amt : '';
  document.getElementById('ss-memo').value = sp.memo || '';
  setPay(sp.pay || 'card');
  sheetEl.classList.add('open');
}
function closeSheet(){ sheetEl.classList.remove('open'); sheetTarget = null; }
function refreshAfterSpend(di, si){
  if (di === curDay && markers[si]) markers[si].setPopupContent(buildPopup(di, si));
  updateDaySummary(curDay);
}
document.getElementById('pay-card').addEventListener('click', () => setPay('card'));
document.getElementById('pay-cash').addEventListener('click', () => setPay('cash'));
document.getElementById('ss-save').addEventListener('click', () => {
  if (!sheetTarget) return;
  const amt = parseFloat(document.getElementById('ss-amt').value);
  if (isNaN(amt) || amt < 0){ document.getElementById('ss-amt').focus(); return; }
  const [di, si] = sheetTarget;
  SPEND[spendKey(DAYS[di].day, si)] = { amt, pay: curPay, memo: document.getElementById('ss-memo').value.trim() };
  persistSpend(); refreshAfterSpend(di, si); closeSheet();
});
document.getElementById('ss-del').addEventListener('click', () => {
  if (!sheetTarget) return;
  const [di, si] = sheetTarget;
  delete SPEND[spendKey(DAYS[di].day, si)];
  persistSpend(); refreshAfterSpend(di, si); closeSheet();
});
document.getElementById('ss-close').addEventListener('click', closeSheet);

/* --- 전체 지출 테이블 (테마별 + 일별) --- */
function openExpenseModal(){
  const cs = {}; CATS.forEach(c => cs[c] = { emin:0, emax:0, act:0 });
  const dayRows = [];
  let gEmin=0, gEmax=0, gAct=0;
  DAYS.forEach(d => {
    const t = EST[d.day] || {};
    let emin=0, emax=0, act=0;
    for (const k in t){
      emin += t[k][0]; emax += t[k][1];
      const c = cs[t[k][2]] || cs['기타'];
      c.emin += t[k][0]; c.emax += t[k][1];
    }
    d.stops.forEach((s, k) => {
      const sp = SPEND[spendKey(d.day, k)];
      if (sp){
        act += sp.amt;
        const cat = (t[k] && t[k][2]) || '기타';
        (cs[cat] || cs['기타']).act += sp.amt;
      }
    });
    gEmin += emin; gEmax += emax; gAct += act;
    if (emin || act) dayRows.push(`<tr><td>D${d.day} (${d.date})</td><td>${fmt$(Math.round(emin))}~${fmt$(Math.round(emax))}</td><td>${act ? fmt$(act) : '—'}</td></tr>`);
  });
  const catRows = CATS
    .filter(c => cs[c].emin || cs[c].act)
    .map(c => `<tr><td>${c}</td><td>${fmt$(Math.round(cs[c].emin))}~${fmt$(Math.round(cs[c].emax))}</td><td>${cs[c].act ? fmt$(cs[c].act) : '—'}</td></tr>`).join('');
  document.getElementById('em-body').innerHTML = `
    <h4>테마별</h4>
    <table><tr><th>카테고리</th><th>예상</th><th>실제</th></tr>${catRows}
    <tr class="em-total"><td>합계</td><td>${fmt$(Math.round(gEmin))}~${fmt$(Math.round(gEmax))}</td><td>${gAct ? fmt$(gAct) : '—'}</td></tr></table>
    <h4>일별</h4>
    <table><tr><th>날짜</th><th>예상</th><th>실제</th></tr>${dayRows.join('')}</table>`;
  document.getElementById('expense-modal').style.display = 'flex';
}
document.getElementById('day-summary').addEventListener('click', openExpenseModal);
document.getElementById('hd-expense').addEventListener('click', openExpenseModal);
document.getElementById('em-close').addEventListener('click', () => document.getElementById('expense-modal').style.display = 'none');
document.getElementById('expense-modal').addEventListener('click', (e) => {
  if (e.target.id === 'expense-modal') e.target.style.display = 'none';
});

/* --- GPS 내 위치 --- */
const gpsLayer = L.layerGroup().addTo(map);
const gpsBtn = document.getElementById('gps-btn');
let geoWatch = null, geoMarker = null, geoCircle = null, geoFirstFix = false;
gpsBtn.addEventListener('click', () => {
  if (geoWatch !== null){
    navigator.geolocation.clearWatch(geoWatch);
    geoWatch = null; geoMarker = null; geoCircle = null; geoFirstFix = false;
    gpsLayer.clearLayers();
    gpsBtn.classList.remove('on');
    return;
  }
  if (!navigator.geolocation){ alert('이 브라우저에서는 위치 기능을 지원하지 않습니다.'); return; }
  gpsBtn.classList.add('on');
  geoWatch = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (!geoMarker){
      geoMarker = L.marker(ll, { icon: L.divIcon({ className:'', html:'<div class="gps-dot"></div>', iconSize:[20,20], iconAnchor:[10,10] }) }).addTo(gpsLayer);
      geoCircle = L.circle(ll, { radius: pos.coords.accuracy, color:'#4f8cff', weight:1, fillOpacity:0.08 }).addTo(gpsLayer);
    } else {
      geoMarker.setLatLng(ll);
      geoCircle.setLatLng(ll).setRadius(pos.coords.accuracy);
    }
    if (!geoFirstFix){ geoFirstFix = true; map.setView(ll, Math.max(map.getZoom(), 15)); }
  }, err => {
    gpsBtn.classList.remove('on');
    if (geoWatch !== null){ navigator.geolocation.clearWatch(geoWatch); geoWatch = null; }
    alert('위치를 가져올 수 없습니다. 파일을 로컬로 직접 열면 iOS가 위치 권한을 막는 경우가 있습니다 — 그 경우에도 나머지 기능은 정상 동작합니다.');
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
});

/* 데스크톱 편의: ←/→ 로 날짜 이동, ↑/↓ 로 스팟 이동 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') selectDay(Math.min(DAYS.length-1, curDay+1));
  else if (e.key === 'ArrowLeft') selectDay(Math.max(0, curDay-1));
  else if (e.key === 'ArrowDown' && DAYS[curDay].stops.length) { e.preventDefault(); scrollToIndex(Math.min(DAYS[curDay].stops.length-1, currentIndex+1)); }
  else if (e.key === 'ArrowUp' && DAYS[curDay].stops.length) { e.preventDefault(); scrollToIndex(Math.max(0, currentIndex-1)); }
});

/* 초기 선택: 마지막으로 보던 날, 없으면 데이터 있는 첫 날 */
let initDay = 1;
try {
  const saved = parseInt(localStorage.getItem('nycLastDay'), 10);
  if (!isNaN(saved) && saved >= 0 && saved < DAYS.length) initDay = saved;
} catch(e){}
selectDay(initDay);
</script>
