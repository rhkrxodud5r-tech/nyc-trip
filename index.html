<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NYC 여행 전체 일정 지도 (10/6~10/20)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --bg:#0e1116; --panel:rgba(18,22,30,.82); --panel-solid:#151a23;
    --line:rgba(255,255,255,.07); --txt:#f2f5f9; --sub:#98a2b3;
    --acc:#4f8cff; --acc-grad:linear-gradient(135deg,#5b95ff,#3f7bf0);
    --shadow:0 8px 28px rgba(0,0,0,.42);
    --blur:blur(12px) saturate(1.3); /* 블러 강도 완화 — iPad GPU 부하 절감 */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); overscroll-behavior:none;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    touch-action:manipulation; /* 더블탭 대기 제거 — 버튼 반응 즉시화 */
  }
  button { font-family:inherit; }

  /* ---- 레이아웃: header 56 + day칩 42 + legend 30 = 128 ---- */
  header {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    height:calc(56px + env(safe-area-inset-top, 0px));
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--txt); display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; padding-top:env(safe-area-inset-top, 0px);
  }
  .hd-actions { display:flex; gap:8px; align-items:center; flex:0 0 auto; }
  #hd-reload {
    width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(255,255,255,.08); color:var(--txt);
    display:flex; align-items:center; justify-content:center; transition:background .2s, transform .3s;
  }
  #hd-reload svg { width:15px; height:15px; stroke:#e6ebf2; }
  #hd-reload:active { background:rgba(255,255,255,.16); transform:rotate(180deg); }
  header h1 { font-size:16px; margin:0; font-weight:700; letter-spacing:-.01em; }
  header h1::after { content:' ▾'; color:var(--sub); font-size:12px; font-weight:600; }
  header .sub { font-size:11px; color:var(--sub); margin-top:2px; }
  #hd-day { cursor:pointer; padding:6px 8px; margin-left:-8px; border-radius:12px; transition:background .2s; }
  #hd-day:active { background:rgba(255,255,255,.08); }
  #hd-expense {
    border:none; background:rgba(255,255,255,.08); color:var(--txt);
    font-size:11.5px; font-weight:600; padding:7px 12px; border-radius:999px; cursor:pointer;
    transition:background .2s;
  }
  #hd-expense:active { background:rgba(255,255,255,.16); }

  /* ---- 날짜 선택 모달 ---- */
  #day-modal {
    position:fixed; inset:0; z-index:2100; background:rgba(0,0,0,.55);
    display:none; align-items:center; justify-content:center;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  }
  #day-card {
    width:min(92vw,400px); max-height:74vh; overflow-y:auto;
    background:var(--panel-solid); color:#fff; border-radius:20px; padding:10px 8px;
    border:1px solid var(--line); box-shadow:var(--shadow);
    animation:cardIn .28s cubic-bezier(.32,.72,.25,1);
  }
  #day-card h2 { font-size:14px; margin:8px 10px 10px; color:var(--acc); }
  .dm-row {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 12px; border-radius:12px; cursor:pointer; transition:background .15s;
  }
  .dm-row:active { background:rgba(255,255,255,.07); }
  .dm-row.cur { background:rgba(79,140,255,.16); }
  .dm-row.cur .dm-d { color:var(--acc); }
  .dm-l { display:flex; align-items:baseline; gap:8px; flex:0 0 auto; }
  .dm-d { font-size:13.5px; font-weight:800; }
  .dm-date { font-size:11px; color:var(--sub); }
  .dm-r { font-size:11px; color:var(--sub); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dm-row.nodata .dm-r, .dm-row.nodata .dm-d { opacity:.5; }
  .dm-tag { background:rgba(255,255,255,.08); border-radius:999px; padding:2px 8px; font-size:10px; }

  #legend {
    position:fixed; top:calc(56px + env(safe-area-inset-top, 0px)); left:0; right:0; height:32px; z-index:1000;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--txt); padding:0 12px; font-size:10.5px;
    display:flex; gap:8px; align-items:center; overflow-x:auto; white-space:nowrap;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
  }
  #legend::-webkit-scrollbar { display:none; }
  .legend-item {
    display:flex; align-items:center; gap:6px; flex:0 0 auto; color:var(--sub); font-weight:600;
    background:rgba(255,255,255,.05); border-radius:999px; padding:3px 10px;
  }
  .legend-line { width:16px; height:4px; border-radius:2px; display:inline-block; }

  #map { position:absolute; top:calc(88px + env(safe-area-inset-top, 0px)); bottom:0; left:0; right:0; }

  /* ---- 팝업 ---- */
  .leaflet-popup-content-wrapper {
    border-radius:16px; box-shadow:0 14px 44px rgba(0,0,0,.32);
  }
  .leaflet-popup-content { margin:13px 15px; }
  .popup-title { font-weight:800; font-size:14px; margin-bottom:3px; letter-spacing:-.01em; }
  .popup-time { color:var(--acc); font-weight:700; font-size:12px; margin-bottom:7px; }
  .popup-row { font-size:12px; margin:3px 0; line-height:1.45; }
  .popup-row b { color:#333; }
  .popup-note { font-size:11.5px; color:#8a5200; background:#fff4e0; border-radius:10px; padding:7px 9px; margin-top:7px; line-height:1.45; }

  .divnum {
    background:linear-gradient(180deg,#6aa2ff,#3f7bf0); color:#fff; border-radius:50%; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
    border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.4);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .divnum.food { background:linear-gradient(180deg,#f07264,#d84838); }
  .divnum.attraction { background:linear-gradient(180deg,#a279ff,#7847ec); }
  .divnum.transit { background:linear-gradient(180deg,#6f7a8a,#4d5765); }
  .divnum.sel {
    transform:scale(1.35);
    box-shadow:0 0 0 4px rgba(79,140,255,.35), 0 4px 14px rgba(0,0,0,.5);
  }

  /* ---- 스크롤 피커 ---- */
  #picker-label {
    position:fixed; z-index:1000; right:14px; bottom:calc(242px + env(safe-area-inset-bottom));
    max-width:180px; background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px;
    padding:7px 11px; border-radius:12px; text-align:right; line-height:1.35;
    box-shadow:var(--shadow); border:1px solid var(--line);
  }
  #picker-label .pl-num { color:var(--acc); font-weight:800; margin-right:4px; }
  #picker-wrap {
    position:fixed; right:14px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:1000;
    width:172px; height:220px; border-radius:20px; overflow:hidden;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    box-shadow:var(--shadow); border:1px solid var(--line);
  }
  #picker-highlight {
    position:absolute; left:6px; right:6px; top:88px; height:44px; z-index:2;
    background:rgba(79,140,255,.14); border-top:1px solid rgba(79,140,255,.55);
    border-bottom:1px solid rgba(79,140,255,.55); border-radius:8px; pointer-events:none;
  }
  #picker-scroll {
    position:absolute; inset:0; overflow-y:scroll; -webkit-overflow-scrolling:touch;
    scroll-snap-type:y mandatory; padding:88px 0;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 30%, #000 70%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0, #000 30%, #000 70%, transparent 100%);
  }
  #picker-scroll::-webkit-scrollbar { display:none; }
  .picker-row {
    height:44px; display:flex; align-items:center; justify-content:center; gap:6px;
    scroll-snap-align:center; color:#6b7484; font-size:13px; font-weight:500; cursor:pointer;
    transition: color .15s ease, font-size .15s ease, font-weight .15s ease;
  }
  .picker-row .pr-num {
    width:20px; height:20px; border-radius:50%; background:#1d232e; color:#9aa3b2;
    display:flex; align-items:center; justify-content:center; font-size:10px; flex:0 0 auto;
    transition: background .15s ease, color .15s ease;
  }
  .picker-row.active { color:#fff; font-size:14.5px; font-weight:700; }
  .picker-row.active .pr-num { background:#4f8cff; color:#fff; }

  /* ---- 미정 날짜 안내 카드 ---- */
  @keyframes phIn { from { opacity:0; transform:translate(-50%,-36%); } to { opacity:1; transform:translate(-50%,-40%); } }
  #placeholder {
    position:fixed; z-index:999; left:50%; top:50%; transform:translate(-50%,-40%);
    width:min(86vw, 400px); background:var(--panel); color:#e8ecf2;
    -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border-radius:20px; padding:20px 18px; box-shadow:var(--shadow); border:1px solid var(--line);
    display:none; line-height:1.6; font-size:13px;
    animation:phIn .28s cubic-bezier(.32,.72,.25,1);
  }
  #placeholder h2 { margin:0 0 8px; font-size:15px; color:var(--acc); }
  #placeholder .ph-note { color:#9aa3b2; font-size:12px; margin-top:10px; }

  /* ---- 일별 지출 요약 (우측상단) ---- */
  #day-summary {
    position:fixed; top:calc(96px + env(safe-area-inset-top, 0px)); right:10px; z-index:999; display:none; cursor:pointer;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px; font-weight:700;
    padding:7px 11px; border-radius:999px; box-shadow:var(--shadow); border:1px solid var(--line);
    transition:transform .15s;
  }
  #day-summary:active { transform:scale(.96); }
  #day-summary .ds-lbl { color:var(--sub); font-size:10px; font-weight:500; margin:0 2px 0 7px; }
  #day-summary .ds-lbl:first-child { margin-left:0; }
  #day-summary .ds-chev { color:var(--sub); margin-left:5px; font-weight:400; }

  /* ---- 차량/대중교통 토글 (듀얼모드 있는 날만 표시) ---- */
  #tmode {
    position:fixed; top:calc(138px + env(safe-area-inset-top, 0px)); right:10px; z-index:999; display:none;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border-radius:999px; padding:3px; box-shadow:var(--shadow); border:1px solid var(--line);
  }
  #tmode button {
    border:none; background:transparent; color:var(--sub); font-size:11px; font-weight:700;
    padding:5px 11px; border-radius:999px; cursor:pointer; transition:background .2s, color .2s;
  }
  #tmode button.sel { background:var(--acc-grad); color:#fff; }

  /* ---- 환율·날씨 아일랜드 (좌상단) ---- */
  #island {
    position:fixed; top:calc(96px + env(safe-area-inset-top, 0px)); left:10px; z-index:999; cursor:pointer;
    background:rgba(10,12,16,.88); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px; font-weight:700;
    padding:7px 12px; border-radius:999px; box-shadow:var(--shadow); border:1px solid var(--line);
    display:flex; align-items:center; gap:8px; transition:transform .15s;
  }
  #island:active { transform:scale(.96); }
  #island .isl-div { width:1px; height:11px; background:rgba(255,255,255,.18); }
  #island .isl-dim { color:var(--sub); font-weight:500; }
  #island-card {
    position:fixed; top:calc(138px + env(safe-area-inset-top, 0px)); left:10px; z-index:1001;
    width:min(88vw, 330px); display:none;
    background:var(--panel-solid); color:#fff; border-radius:18px; padding:14px;
    border:1px solid var(--line); box-shadow:var(--shadow);
    animation:cardIn .25s cubic-bezier(.32,.72,.25,1);
    font-size:12.5px; line-height:1.55;
  }
  #island-card h4 { margin:0 0 4px; font-size:11px; color:var(--sub); font-weight:600; letter-spacing:.02em; }
  .ic-big { font-size:17px; font-weight:800; letter-spacing:-.01em; }
  .ic-sub { font-size:10.5px; color:var(--sub); margin-top:2px; }
  .ic-sep { height:1px; background:var(--line); margin:12px 0; }
  .ic-conv { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .in-wrap { position:relative; flex:1; min-width:0; }
  .in-pre {
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    color:var(--sub); font-size:13px; font-weight:700; pointer-events:none;
  }
  .ic-conv input {
    width:100%; background:#1d232e; border:1px solid #2c3442; color:#fff;
    border-radius:10px; padding:8px 10px 8px 26px; font-size:13px; font-family:inherit;
  }
  .ic-conv .ic-eq { color:var(--sub); flex:0 0 auto; }
  .ic-row { display:flex; justify-content:space-between; gap:10px; margin:3px 0; }
  .ic-row .k { color:var(--sub); }

  /* ---- 팝업 버튼/태그 ---- */
  .pbtn-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
  .pbtn {
    flex:1 1 auto; text-align:center; font-size:11.5px; font-weight:700; padding:7px 9px;
    border-radius:999px; background:#eef2f8; color:#2c3a4f; text-decoration:none; border:none; cursor:pointer;
    font-family:inherit; transition:filter .15s, transform .1s;
  }
  .pbtn:active { filter:brightness(.92); transform:scale(.97); }
  .pbtn.spend { background:var(--acc-grad); color:#fff; flex-basis:100%; }
  .cat-tag { font-size:10px; background:#eef2f8; color:#5b6572; border-radius:999px; padding:1px 7px; margin-left:5px; }
  .popup-row.spent { color:#1d7a3c; font-weight:700; }

  /* ---- GPS 버튼 ---- */
  #gps-btn {
    position:fixed; left:14px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:1000;
    width:46px; height:46px; border-radius:50%; border:1px solid var(--line); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; box-shadow:var(--shadow); transition:background .2s, transform .15s;
  }
  #gps-btn:active { transform:scale(.94); }
  #gps-btn svg { width:20px; height:20px; stroke:#e6ebf2; }
  #gps-btn.on { background:var(--acc-grad); border-color:transparent; }
  #gps-btn.on svg { stroke:#fff; }
  .gps-dot { width:14px; height:14px; border-radius:50%; background:#4f8cff; border:3px solid #fff; box-shadow:0 0 10px rgba(79,140,255,.9); }
  #crowd-btn {
    position:fixed; left:14px; bottom:calc(70px + env(safe-area-inset-bottom)); z-index:1000;
    width:46px; height:46px; border-radius:50%; border:1px solid var(--line); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; box-shadow:var(--shadow); transition:background .2s, transform .15s;
  }
  #crowd-btn:active { transform:scale(.94); }
  #crowd-btn svg { width:20px; height:20px; stroke:#e6ebf2; fill:none; }
  #crowd-btn.on { background:linear-gradient(135deg,#f08c3a,#d0512d); border-color:transparent; }
  #park-btn {
    position:fixed; left:14px; bottom:calc(124px + env(safe-area-inset-bottom)); z-index:1000;
    width:46px; height:46px; border-radius:50%; border:1px solid var(--line); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:19px;
    background:var(--panel); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; box-shadow:var(--shadow); transition:background .2s, transform .15s;
  }
  #park-btn:active { transform:scale(.94); }
  #park-btn.on { background:linear-gradient(135deg,#3fae5e,#1f7a3c); border-color:transparent; }
  .park-pin {
    width:16px; height:16px; border-radius:50%; background:#2fa84f; border:2px solid #fff;
    box-shadow:0 1px 5px rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center;
  }
  .park-pin.bike { background:#3f6fe0; }
  .cr-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:baseline; }
  #crowd-toast {
    position:fixed; top:calc(142px + env(safe-area-inset-top, 0px)); left:50%; transform:translateX(-50%);
    z-index:1002; display:none; white-space:nowrap;
    background:rgba(10,12,16,.92); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:#fff; font-size:11.5px; font-weight:600; padding:8px 14px; border-radius:999px;
    box-shadow:var(--shadow); border:1px solid var(--line);
    transition:opacity .4s; opacity:1;
  }
  #crowd-toast .cr-dot { margin-left:8px; }
  #crowd-toast .cr-dot:first-child { margin-left:0; }

  /* ---- 지출 입력 시트 ---- */
  #spend-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:2000;
    background:var(--panel-solid); color:#fff; border-radius:20px 20px 0 0;
    padding:14px 16px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.55); border-top:1px solid var(--line);
    transform:translateY(110%); transition:transform .3s cubic-bezier(.32,.72,.25,1);
  }
  #spend-sheet.open { transform:translateY(0); }
  #spend-sheet::before {
    content:''; display:block; width:36px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.18); margin:0 auto 12px;
  }
  #spend-sheet h3 { margin:0 0 12px; font-size:14px; letter-spacing:-.01em; }
  .ss-row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  #ss-amt, #ss-memo {
    flex:1; min-width:0; background:#1d232e; border:1px solid #2c3442; color:#fff;
    border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit;
  }
  #ss-amt { width:100%; padding-left:28px; }
  .ss-row .in-pre { font-size:14px; }
  .pay-btn { padding:10px 14px; border-radius:10px; background:#1d232e; color:#9aa3b2; border:1px solid #2c3442; font-size:13px; cursor:pointer; font-family:inherit; }
  .pay-btn.sel { background:#4f8cff; color:#fff; border-color:#4f8cff; }
  .pay-btn.grow { flex:1; }
  .ss-note { font-size:10.5px; color:var(--sub); margin:-4px 0 10px; }
  .em-note { font-size:10.5px; color:var(--sub); margin-top:10px; }
  .ss-actions { display:flex; gap:8px; }
  .ss-actions button { flex:1; padding:11px; border-radius:10px; border:none; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  #ss-save { background:#4f8cff; color:#fff; }
  #ss-del { background:#3a2026; color:#e0574c; }
  #ss-close { background:#1d232e; color:#9aa3b2; }

  /* ---- 전체 지출 모달 ---- */
  #expense-modal {
    position:fixed; inset:0; z-index:2100; background:rgba(0,0,0,.55);
    display:none; align-items:center; justify-content:center;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(18px) scale(.97); } to { opacity:1; transform:none; } }
  #expense-card {
    width:min(92vw,430px); max-height:80vh; overflow-y:auto;
    background:var(--panel-solid); color:#fff; border-radius:20px; padding:18px;
    border:1px solid var(--line); box-shadow:var(--shadow);
    animation:cardIn .28s cubic-bezier(.32,.72,.25,1);
  }
  #expense-card h2 { font-size:15px; margin:0 0 12px; color:#4f8cff; }
  #expense-card h4 { font-size:12.5px; margin:16px 0 6px; color:#9aa3b2; }
  #expense-card table { width:100%; border-collapse:collapse; font-size:12px; }
  #expense-card th, #expense-card td { padding:6px 4px; text-align:right; border-bottom:1px solid #262b36; }
  #expense-card th:first-child, #expense-card td:first-child { text-align:left; }
  #expense-card th { color:#9aa3b2; font-weight:600; }
  .em-total td { font-weight:800; color:#fff; border-top:2px solid #3a4657; }
  #em-close { margin-top:14px; width:100%; padding:11px; border-radius:10px; border:none; background:#1d232e; color:#9aa3b2; font-weight:700; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<header>

/* ============================================================
   이하 렌더링 로직 — 데이터만 고치면 아래는 손댈 필요 없음
   ============================================================ */
const ROW_H = 44;
const map = L.map('map', {
  zoomControl:false,
  preferCanvas:true,                       /* 경로를 Canvas로 렌더 — 줌 중 SVG 경로 왜곡(꼬임) 제거 */
  renderer: L.canvas({ padding:0.5 }),     /* 화면 밖 여유분까지 미리 그려 팬 중 끊김 방지 */
}).setView([40.7128,-74.0060], 12);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains:'abcd',
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

const dayLayer = L.layerGroup().addTo(map);
const legendEl = document.getElementById('legend');
const phEl = document.getElementById('placeholder');
const scrollEl = document.getElementById('picker-scroll');
const labelEl = document.getElementById('picker-label');
const pickerWrap = document.getElementById('picker-wrap');
const hdTitle = document.getElementById('hd-title');
const hdSub = document.getElementById('hd-sub');

let markers = [], rows = [];
let currentIndex = 0, settleTimer = null, programmaticScroll = false;
let curDay = null;

/* --- 날짜 선택 모달 --- */
const dayModal = document.getElementById('day-modal');
function openDayModal(){
  document.getElementById('dm-list').innerHTML = DAYS.map((d, k) => `
    <div class="dm-row ${k===curDay ? 'cur' : ''} ${d.stops.length ? '' : 'nodata'}" onclick="pickDay(${k})">
      <div class="dm-l"><span class="dm-d">D${d.day}</span><span class="dm-date">${d.date} (${d.dow})</span></div>
      <div class="dm-r">${d.stops.length ? d.sub : '<span class="dm-tag">미정</span>'}</div>
    </div>`).join('');
  dayModal.style.display = 'flex';
}
function pickDay(k){ dayModal.style.display = 'none'; selectDay(k); }
document.getElementById('hd-day').addEventListener('click', openDayModal);
dayModal.addEventListener('click', (e) => { if (e.target === dayModal) dayModal.style.display = 'none'; });

function buildLegend(day){
  const used = [...new Set(day.modes.flatMap(m => segLegs(m).map(l => l.mode)))];
  legendEl.innerHTML = used.length
    ? used.map(m => `<div class="legend-item"><span class="legend-line" style="background:${MODE_META[m].color}"></span>${MODE_META[m].label}</div>`).join('')
    : '<div class="legend-item" style="color:#6b7484">일정 확정 후 이동수단이 표시됩니다</div>';
}

function selectDay(i){
  curDay = i;
  const day = DAYS[i];
  hdTitle.textContent = day.title;
  hdSub.textContent = `${day.date}(${day.dow}) · ${day.sub}`;

  dayLayer.clearLayers();
  markers = []; rows = []; currentIndex = 0;
  scrollEl.innerHTML = '';
  buildLegend(day);
  updateDaySummary(i);
  updateTmode(day);
  if (typeof islandCard !== 'undefined' && islandCard.style.display === 'block') renderIslandCard();

  if (!day.stops.length){
    phEl.style.display = 'block';
    phEl.innerHTML = `<h2>${day.title} — ${day.date}(${day.dow})</h2>${day.placeholder || '상세 일정 미정'}<div class="ph-note">확정되면 이 파일의 DAYS 데이터에 stops를 채우면 지도·피커가 자동 생성됩니다.</div>`;
    pickerWrap.style.display = 'none';
    labelEl.style.display = 'none';
    map.setView([40.7300,-73.9850], 11);
    return;
  }

  phEl.style.display = 'none';
  pickerWrap.style.display = 'block';
  labelEl.style.display = 'block';
  labelEl.innerHTML = '스크롤해서 스팟 선택 ▾';

  day.stops.forEach((s, idx) => {
    const icon = L.divIcon({
      className:'', html:`<div class="divnum ${s.type}">${idx}</div>`,
      iconSize:[26,26], iconAnchor:[13,13]
    });
    const m = L.marker(s.coord, { icon }).addTo(dayLayer);
    m.bindPopup(() => buildPopup(i, idx), { maxWidth:270, autoPan:false });
    m.on('click', () => focusStop(idx, 'marker'));
    markers.push(m);
  });

  for (let k=0; k<day.stops.length-1; k++){
    let prev = day.stops[k].coord;
    for (const leg of segLegs(day.modes[k])){
      const end = leg.to || day.stops[k+1].coord;
      const meta = MODE_META[leg.mode] || MODE_META.walk;
      L.polyline([prev, end], { color:'#ffffff', weight: meta.weight+4, opacity:0.9 }).addTo(dayLayer);
      L.polyline([prev, end], { color: meta.color, weight: meta.weight, opacity:1, dashArray: meta.dash }).addTo(dayLayer);
      prev = end;
    }
  }

  map.fitBounds(L.latLngBounds(day.stops.map(s=>s.coord)), { padding:[30,30] });

  day.stops.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'picker-row';
    let nm = s.name;
    if (nm.length > 11) nm = nm.slice(0,10) + '…';
    row.innerHTML = `<span class="pr-num">${idx}</span><span>${nm}</span>`;
    row.addEventListener('click', () => focusStop(idx));
    scrollEl.appendChild(row);
    rows.push(row);
  });
  /* 피커 높이를 스팟 수에 맞춰 가변 조절 (화면 가림 최소화) */
  const wrapH = Math.min(200, ROW_H * day.stops.length + 46);
  const pad = Math.round((wrapH - ROW_H) / 2);
  pickerWrap.style.height = wrapH + 'px';
  document.getElementById('picker-highlight').style.top = pad + 'px';
  scrollEl.style.padding = pad + 'px 0';
  labelEl.style.bottom = `calc(${16 + wrapH + 6}px + env(safe-area-inset-bottom, 0px))`;

  programmaticScroll = true;
  scrollEl.scrollTop = 0;
  setTimeout(()=> programmaticScroll = false, 200);
  updateActiveRow(0);
}

function updateActiveRow(i){ rows.forEach((r,k)=> r.classList.toggle('active', k===i)); }
function updatePickerLabel(i){
  labelEl.innerHTML = `<span class="pl-num">${i}</span>${DAYS[curDay].stops[i].name}`;
}
function scrollToIndex(i){
  programmaticScroll = true;
  scrollEl.scrollTo({ top: i*ROW_H, behavior:'smooth' });
  setTimeout(()=> programmaticScroll = false, 450);
}
function setSelMarker(i){
  markers.forEach((m, k) => {
    const el = m.getElement();
    if (el){ const d = el.querySelector('.divnum'); if (d) d.classList.toggle('sel', k===i); }
    m.setZIndexOffset(k===i ? 1000 : 0);
  });
}
/* 팝업이 헤더에 가리지 않게 마커보다 110px 위 지점으로 이동 (autoPan 대체 — 이중 애니메이션 제거) */
function flyToStop(coord){
  const p = map.project(L.latLng(coord), 16);
  map.flyTo(map.unproject([p.x, p.y - 110], 16), 16, { duration:0.45 });
}
function focusStop(i, source){
  currentIndex = i;
  updateActiveRow(i);
  updatePickerLabel(i);
  setSelMarker(i);
  if (source !== 'picker') scrollToIndex(i);
  if (source !== 'marker') flyToStop(DAYS[curDay].stops[i].coord);
  markers[i].openPopup();
}

scrollEl.addEventListener('scroll', () => {
  if (!DAYS[curDay] || !DAYS[curDay].stops.length) return;
  const N = DAYS[curDay].stops.length;
  const idx = Math.max(0, Math.min(N-1, Math.round(scrollEl.scrollTop / ROW_H)));
  updateActiveRow(idx);
  clearTimeout(settleTimer);
  settleTimer = setTimeout(() => {
    if (programmaticScroll) return;
    if (idx !== currentIndex || labelEl.textContent.includes('선택')) {
      currentIndex = idx;
      updatePickerLabel(idx);
      setSelMarker(idx);
      flyToStop(DAYS[curDay].stops[idx].coord);
      markers[idx].openPopup();
    }
  }, 130);
}, { passive:true });

/* ============================================================
   지출 관리
   - EST[day번호][stop인덱스] = [예상최소, 예상최대, 카테고리] (2인 합계 USD)
   - 실제 지출은 팝업의 "지출 입력"으로 기입 → localStorage 저장
   ============================================================ */
const CATS = ['교통','식사','카페·간식','입장·투어','쇼핑','기타'];
const EST = {

  2: { 0:[16,19,'교통'], 4:[6,6,'교통'], 6:[16,16,'식사'], 8:[4.5,9,'카페·간식'],
       10:[8.5,10,'식사'], 13:[94,95,'입장·투어'], 14:[24,28,'식사'], 15:[6,6,'교통'] },
  /* Day3: 'r7'=갤러거스→메트 차량, 's7'=메트→타임스퀘어 지하철 (스팟에 안 붙는 이동비 항목 — 합계에만 반영) */
  3: { 1:[6,6,'교통'], 3:[12,16,'식사'], 6:[68,68,'식사'], 7:[60,60,'입장·투어'],

function fmtNumStr(s, maxDec){

/* 일출·일몰 천문 계산 (뉴욕, 10월 = EDT/UTC-4) — API 없이 아무 날짜나 계산 */
function sunTime(y, mo, dy, isRise){
  const rad = Math.PI/180, lat = 40.7128, lng = -74.0060, tzOff = -4, zenith = 90.833;
  const N1 = Math.floor(275*mo/9), N2 = Math.floor((mo+9)/12);
  const N3 = 1 + Math.floor((y - 4*Math.floor(y/4) + 2)/3);
  const N = N1 - (N2*N3) + dy - 30;
  const lngHour = lng/15;
  const t = isRise ? N + ((6 - lngHour)/24) : N + ((18 - lngHour)/24);
  const M = (0.9856*t) - 3.289;
  let L = M + (1.916*Math.sin(M*rad)) + (0.020*Math.sin(2*M*rad)) + 282.634;
  L = ((L%360)+360)%360;
  let RA = Math.atan(0.91764*Math.tan(L*rad))/rad;
  RA = ((RA%360)+360)%360;
  RA = (RA + (Math.floor(L/90)*90 - Math.floor(RA/90)*90))/15;
  const sinDec = 0.39782*Math.sin(L*rad), cosDec = Math.cos(Math.asin(sinDec));
  const cosH = (Math.cos(zenith*rad) - (sinDec*Math.sin(lat*rad))) / (cosDec*Math.cos(lat*rad));
  if (cosH > 1 || cosH < -1) return '—';
  let H = isRise ? 360 - Math.acos(cosH)/rad : Math.acos(cosH)/rad;
  H /= 15;
  const T = H + RA - (0.06571*t) - 6.622;
  let lt = ((T - lngHour + tzOff) % 24 + 24) % 24;
  const hh = Math.floor(lt), mm = Math.round((lt-hh)*60);
  return (hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}

    ${s.menu && s.menu!=='-' ? `<div class="popup-row"><b>메뉴</b> ${s.menu}</div>` : ''}
    ${s.price && s.price!=='-' ? `<div class="popup-row"><b>가격</b> ${s.price}</div>` : ''}
    ${est ? `<div class="popup-row"><b>예상</b> ${fmt$(est[0])}${est[1]>est[0] ? '~'+fmt$(est[1]) : ''}<span class="cat-tag">${est[2]}</span></div>` : ''}
    ${sp ? `<div class="popup-row spent"><b>실제</b> ${spDisp(sp)} · ${sp.pay==='cash'?'현금':'카드'}${sp.memo ? ' · '+sp.memo : ''}</div>` : ''}
    ${(CROWD[d.day]||{})[si] ? `<div class="popup-row"><b>혼잡</b> <span class="cr-dot" style="background:${CR_COLORS[CROWD[d.day][si][0]]}"></span>${CR_NAMES[CROWD[d.day][si][0]]}${CROWD[d.day][si][1] ? ' — '+CROWD[d.day][si][1] : ''}</div>` : ''}
    ${s.resv ? `<div class="popup-row"><b>예약</b> ${s.resv.at.slice(5,10).replace('-','/')} ${s.resv.at.slice(11,16)}${s.resv.label ? ' · '+s.resv.label : ''}</div>` : ''}
    ${segRow(d, si)}
    <div class="popup-note">${s.note}</div>
    <div class="pbtn-row">
      <a class="pbtn" href="${gmap}" target="_blank">길찾기</a>
      <a class="pbtn" href="${uber}" target="_blank">Uber</a>
      <a class="pbtn" href="${lyft}" target="_blank">Lyft</a>
      ${extra}
      ${s.resv && s.resv.url ? `<a class="pbtn" href="${s.resv.url}" target="_blank">예약 확인</a>` : ''}
      ${s.resv ? (s.resv.ics
        ? `<a class="pbtn" href="${s.resv.ics}">90분 전 알림</a>`
        : `<button class="pbtn" onclick="dlIcs(${di},${si})">90분 전 알림</button>`) : ''}
      <button class="pbtn spend" onclick="openSpend(${di},${si})">지출 ${sp ? '수정' : '입력'}</button>
    </div>`;
}

/* --- 예약 알림: .ics 캘린더 파일 생성 (90분 전 iOS 네이티브 알림) --- */
function dlIcs(di, si){
  const s = DAYS[di].stops[si], r = s.resv;
  if (!r) return;
  const dp = r.at.split(' ')[0].split('-').map(Number), tp = r.at.split(' ')[1].split(':').map(Number);
  const startUtc = new Date(Date.UTC(dp[0], dp[1]-1, dp[2], tp[0]+4, tp[1])); // 10월 뉴욕 = EDT(UTC-4)
  const endUtc = new Date(startUtc.getTime() + (r.dur || 90) * 60000);
  const f = dt => dt.toISOString().replace(/[-:]/g,'').slice(0,15) + 'Z';
  const esc = t => String(t).replace(/([,;])/g, '\\$1');
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//nyctrip//KO','BEGIN:VEVENT',
    'UID:nyctrip-d' + DAYS[di].day + 's' + si + '@local',
    'DTSTAMP:' + f(new Date()),
    'DTSTART:' + f(startUtc),
    'DTEND:' + f(endUtc),
    'SUMMARY:' + esc(s.name) + ' 예약',
    'DESCRIPTION:' + esc(((r.label || '') + ' ' + (r.url || '')).trim()),
    'BEGIN:VALARM','TRIGGER:-PT90M','ACTION:DISPLAY','DESCRIPTION:예약 90분 전 알림','END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a = document.createElement('a');
  a.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
  a.download = 'nyc-d' + DAYS[di].day + '-reservation.ics';
  document.body.appendChild(a); a.click(); a.remove();
}

/* --- 일별 요약 (우측상단) --- */
function estSumDay(d){
  const t = EST[d.day]; if (!t) return null;
  let mn=0, mx=0;
  for (const k in t){ mn += t[k][0]; mx += t[k][1]; }
  return [mn, mx];
}
function actSumDay(d){
  let a = 0;
  d.stops.forEach((s, k) => { const sp = SPEND[spendKey(d.day, k)]; if (sp) a += toUSD(sp.amt, sp.cur); });
  return a;
}
function updateDaySummary(i){
  const d = DAYS[i], el = document.getElementById('day-summary');
  if (!d.stops.length){ el.style.display = 'none'; return; }
  const est = estSumDay(d), act = actSumDay(d);
  el.style.display = 'block';
  el.innerHTML =
    `<span class="ds-lbl">예상</span>${est ? fmt$(Math.round(est[0]))+(est[1]>est[0] ? '~'+fmt$(Math.round(est[1])) : '') : '—'}` +
    (act > 0 ? `<span class="ds-lbl">실제</span>${fmt$(Math.round(act*100)/100)}` : '') +
    `<span class="ds-chev">›</span>`;
}

/* --- 지출 입력 시트 --- */
let sheetTarget = null, curPay = 'card', curCur = 'USD';
const sheetEl = document.getElementById('spend-sheet');
function setPay(p){
  curPay = p;
  document.getElementById('pay-card').classList.toggle('sel', p==='card');
  document.getElementById('pay-cash').classList.toggle('sel', p==='cash');
}
function setCur(c){
  curCur = c;
  document.getElementById('cur-usd').classList.toggle('sel', c==='USD');
  document.getElementById('cur-krw').classList.toggle('sel', c==='KRW');
  document.getElementById('ss-pre').textContent = c==='KRW' ? '₩' : '$';
  const amtEl = document.getElementById('ss-amt');
  amtEl.value = fmtNumStr(amtEl.value, c==='KRW' ? 0 : 2);
  updateFxHint();
}
function updateFxHint(){
  const el = document.getElementById('ss-fxhint');
  const v = parseNum(document.getElementById('ss-amt').value);
  const r = FX.rate || FALLBACK_RATE;
  if (isNaN(v) || v <= 0){ el.textContent = ''; return; }
  el.textContent = curCur==='KRW'
    ? `≈ ${fmt$(Math.round(v/r*100)/100)} ($1 = ₩${Math.round(r).toLocaleString('ko-KR')})`
    : `≈ ${fmtW(v*r)} ($1 = ₩${Math.round(r).toLocaleString('ko-KR')})`;
}
function openSpend(di, si){
  sheetTarget = [di, si];
  const d = DAYS[di], sp = SPEND[spendKey(d.day, si)] || {};
  document.getElementById('ss-title').textContent = si + '. ' + d.stops[si].name;
  document.getElementById('ss-amt').value = sp.amt != null ? fmtNumStr(String(sp.amt), sp.cur==='KRW' ? 0 : 2) : '';
  document.getElementById('ss-memo').value = sp.memo || '';
  setPay(sp.pay || 'card');
  setCur(sp.cur || 'USD');
  sheetEl.classList.add('open');
}
function closeSheet(){ sheetEl.classList.remove('open'); sheetTarget = null; }
function refreshAfterSpend(di, si){
  if (di === curDay && markers[si]) markers[si].setPopupContent(buildPopup(di, si));
  updateDaySummary(curDay);
}
document.getElementById('pay-card').addEventListener('click', () => setPay('card'));
document.getElementById('pay-cash').addEventListener('click', () => setPay('cash'));
document.getElementById('cur-usd').addEventListener('click', () => setCur('USD'));
document.getElementById('cur-krw').addEventListener('click', () => setCur('KRW'));
document.getElementById('ss-amt').addEventListener('input', (e) => {
  e.target.value = fmtNumStr(e.target.value, curCur==='KRW' ? 0 : 2);
  updateFxHint();
});
document.getElementById('ss-save').addEventListener('click', () => {
  if (!sheetTarget) return;
  const amt = parseNum(document.getElementById('ss-amt').value);
  if (isNaN(amt) || amt < 0){ document.getElementById('ss-amt').focus(); return; }
  const [di, si] = sheetTarget;
  SPEND[spendKey(DAYS[di].day, si)] = { amt, cur: curCur, pay: curPay, memo: document.getElementById('ss-memo').value.trim() };
  persistSpend(); refreshAfterSpend(di, si); closeSheet();
});
document.getElementById('ss-del').addEventListener('click', () => {
  if (!sheetTarget) return;
  const [di, si] = sheetTarget;
  delete SPEND[spendKey(DAYS[di].day, si)];
  persistSpend(); refreshAfterSpend(di, si); closeSheet();
});
document.getElementById('ss-close').addEventListener('click', closeSheet);

/* --- 전체 지출 테이블 (테마별 + 일별) --- */
function openExpenseModal(){
  const cs = {}; CATS.forEach(c => cs[c] = { emin:0, emax:0, act:0 });
  const dayRows = [];
  let gEmin=0, gEmax=0, gAct=0;
  DAYS.forEach(d => {
    const t = EST[d.day] || {};
    let emin=0, emax=0, act=0;
    for (const k in t){
      emin += t[k][0]; emax += t[k][1];
      const c = cs[t[k][2]] || cs['기타'];
      c.emin += t[k][0]; c.emax += t[k][1];
    }
    d.stops.forEach((s, k) => {
      const sp = SPEND[spendKey(d.day, k)];
      if (sp){
        const usd = toUSD(sp.amt, sp.cur);
        act += usd;
        const cat = (t[k] && t[k][2]) || '기타';
        (cs[cat] || cs['기타']).act += usd;
      }
    });
    gEmin += emin; gEmax += emax; gAct += act;
    if (emin || act) dayRows.push(`<tr><td>D${d.day} (${d.date})</td><td>${fmt$(Math.round(emin))}~${fmt$(Math.round(emax))}</td><td>${act ? fmt$(act) : '—'}</td></tr>`);
  });
  const catRows = CATS
    .filter(c => cs[c].emin || cs[c].act)
    .map(c => `<tr><td>${c}</td><td>${fmt$(Math.round(cs[c].emin))}~${fmt$(Math.round(cs[c].emax))}</td><td>${cs[c].act ? fmt$(cs[c].act) : '—'}</td></tr>`).join('');
  document.getElementById('em-body').innerHTML = `
    <h4>테마별</h4>
    <table><tr><th>카테고리</th><th>예상</th><th>실제</th></tr>${catRows}
    <tr class="em-total"><td>합계</td><td>${fmt$(Math.round(gEmin))}~${fmt$(Math.round(gEmax))}</td><td>${gAct ? fmt$(gAct) : '—'}</td></tr></table>
    <h4>일별</h4>
    <table><tr><th>날짜</th><th>예상</th><th>실제</th></tr>${dayRows.join('')}</table>
    <div class="em-note">실제 지출 합계는 USD 기준 · ₩ 입력분은 $1 = ₩${Math.round(FX.rate || FALLBACK_RATE).toLocaleString('ko-KR')}로 환산${gAct ? ' (전체 실제 ≈ '+fmtW(gAct*(FX.rate||FALLBACK_RATE))+')' : ''}</div>`;
  document.getElementById('expense-modal').style.display = 'flex';
}
document.getElementById('day-summary').addEventListener('click', openExpenseModal);
document.getElementById('hd-expense').addEventListener('click', openExpenseModal);
/* 새로고침: 캐시 우회 쿼리를 붙여 항상 최신 배포본을 받아옴 (홈 화면 앱에서도 동작) */
document.getElementById('hd-reload').addEventListener('click', () => {
  location.replace(location.pathname + '?r=' + Date.now());
});
document.getElementById('em-close').addEventListener('click', () => document.getElementById('expense-modal').style.display = 'none');
document.getElementById('expense-modal').addEventListener('click', (e) => {
  if (e.target.id === 'expense-modal') e.target.style.display = 'none';
});

/* --- GPS 내 위치 --- */
const gpsLayer = L.layerGroup().addTo(map);
const gpsBtn = document.getElementById('gps-btn');
let geoWatch = null, geoMarker = null, geoCircle = null, geoFirstFix = false;
gpsBtn.addEventListener('click', () => {
  if (geoWatch !== null){
    navigator.geolocation.clearWatch(geoWatch);
    geoWatch = null; geoMarker = null; geoCircle = null; geoFirstFix = false;
    gpsLayer.clearLayers();
    gpsBtn.classList.remove('on');
    return;
  }
  if (!navigator.geolocation){ alert('이 브라우저에서는 위치 기능을 지원하지 않습니다.'); return; }
  gpsBtn.classList.add('on');
  geoWatch = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (!geoMarker){
      geoMarker = L.marker(ll, { icon: L.divIcon({ className:'', html:'<div class="gps-dot"></div>', iconSize:[20,20], iconAnchor:[10,10] }) }).addTo(gpsLayer);
      geoCircle = L.circle(ll, { radius: pos.coords.accuracy, color:'#4f8cff', weight:1, fillOpacity:0.08 }).addTo(gpsLayer);
    } else {
      geoMarker.setLatLng(ll);
      geoCircle.setLatLng(ll).setRadius(pos.coords.accuracy);
    }
    if (!geoFirstFix){ geoFirstFix = true; map.setView(ll, Math.max(map.getZoom(), 15)); }
  }, err => {
    gpsBtn.classList.remove('on');
    if (geoWatch !== null){ navigator.geolocation.clearWatch(geoWatch); geoWatch = null; }
    alert('위치를 가져올 수 없습니다. 파일을 로컬로 직접 열면 iOS가 위치 권한을 막는 경우가 있습니다 — 그 경우에도 나머지 기능은 정상 동작합니다.');
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
});

  }).addTo(parkLayer);
  m.bindPopup(`
    <div class="popup-title">${p.bike ? '🚲 ' : '🌳 '}${p.name}</div>
    <div class="popup-note">${p.desc}</div>`, { maxWidth:250, autoPan:false });

document.getElementById('park-btn').addEventListener('click', function(){
  parkOn = !parkOn;
  this.classList.toggle('on', parkOn);
  if (parkOn){
    parkLayer.addTo(map);
    map.flyTo([40.7745,-73.9700], 14, { duration:0.6 }); /* 센트럴파크 중심으로 이동 */
  } else { map.removeLayer(parkLayer); }

/* ---- 차량/대중교통 토글 ---- */
function updateTmode(day){
  const el = document.getElementById('tmode');
  const hasDual = day.modes.some(m => typeof m !== 'string');
  el.style.display = hasDual ? 'block' : 'none';
  document.getElementById('tm-car').classList.toggle('sel', transportMode === 'car');
  document.getElementById('tm-transit').classList.toggle('sel', transportMode === 'transit');
}
function setTransportMode(t){
  if (transportMode === t) return;
  transportMode = t;
  try { localStorage.setItem('nycTmode', t); } catch(e){}
  selectDay(curDay); /* 경로 색·범례·팝업 소요시간 일괄 갱신 */
}
document.getElementById('tm-car').addEventListener('click', () => setTransportMode('car'));
document.getElementById('tm-transit').addEventListener('click', () => setTransportMode('transit'));

/* 데스크톱 편의: ←/→ 로 날짜 이동, ↑/↓ 로 스팟 이동 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') selectDay(Math.min(DAYS.length-1, curDay+1));
  else if (e.key === 'ArrowLeft') selectDay(Math.max(0, curDay-1));
  else if (e.key === 'ArrowDown' && DAYS[curDay].stops.length) { e.preventDefault(); scrollToIndex(Math.min(DAYS[curDay].stops.length-1, currentIndex+1)); }
  else if (e.key === 'ArrowUp' && DAYS[curDay].stops.length) { e.preventDefault(); scrollToIndex(Math.max(0, currentIndex-1)); }
});

/* 초기 선택: 오늘 날짜에 해당하는 Day (여행 전 → D1, 여행 후 → D15) */
function defaultDayIndex(){
  const start = new Date(2026, 9, 6);   // 10/6 = Day 1
  const today = new Date();
  start.setHours(0,0,0,0); today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  return Math.max(0, Math.min(DAYS.length - 1, diff));
}
selectDay(defaultDayIndex());
